<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spade – Official Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #7B2FE0;
      --neon: #C77DFF;
      --white: #F5F0FF;
      --card-border: rgba(199,125,255,0.25);
    }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0D0020;
      font-family: 'Rajdhani', sans-serif;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,47,224,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(74,15,168,0.7) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 60% 40%, rgba(155,79,240,0.3) 0%, transparent 50%);
      animation: meshShift 8s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes meshShift {
      from { opacity:0.9; transform:scale(1); }
      to   { opacity:1;   transform:scale(1.04); }
    }
    .card {
      position: relative; z-index: 2;
      width: min(420px, 92vw);
      padding: 44px 36px 40px;
      background: rgba(13,0,32,0.65);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 60px rgba(123,47,224,0.35), 0 0 120px rgba(74,15,168,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .logo-wrap {
      display: flex; justify-content: center; margin-bottom: 20px;
    }
    .logo-ring {
      width: 100px; height: 100px; border-radius: 50%;
      background: #111;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 3px var(--purple), 0 0 30px rgba(155,79,240,0.6);
      animation: pulse 3s ease-in-out infinite;
      overflow: hidden;
    }
    .logo-ring img { width: 80px; height: 80px; object-fit: contain; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px var(--purple), 0 0 30px rgba(155,79,240,0.6); }
      50%      { box-shadow: 0 0 0 3px var(--neon),   0 0 48px rgba(155,79,240,0.9); }
    }
    .wordmark { display:flex; justify-content:center; margin-bottom: 8px; }
    .wordmark img { height: 36px; object-fit: contain; }
    .subtitle {
      text-align: center; color: var(--neon);
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 32px; opacity: 0.75;
    }
    .links { display: flex; flex-direction: column; gap: 13px; }
    .link-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 22px; border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--card-border);
      color: var(--white); text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: all 0.22s ease; position: relative; overflow: hidden;
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    .link-btn:nth-child(1){animation-delay:0.10s}
    .link-btn:nth-child(2){animation-delay:0.18s}
    .link-btn:nth-child(3){animation-delay:0.26s}
    .link-btn:nth-child(4){animation-delay:0.34s}
    .link-btn::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg,rgba(155,79,240,0.15),transparent);
      opacity:0; transition:opacity 0.22s;
    }
    .link-btn:hover { border-color:var(--neon); transform:translateX(4px); box-shadow:-4px 0 20px rgba(155,79,240,0.4); }
    .link-btn:hover::before { opacity:1; }
    .icon-wrap {
      width:36px; height:36px; border-radius:8px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .icon-x  { background:#000; }
    .icon-tg { background:#229ED9; }
    .icon-fb { background:#1877F2; }
    .icon-ig { background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
    .divider { display:flex; align-items:center; gap:12px; margin-top:28px; }
    .divider-line { flex:1; height:1px; background:var(--card-border); }
    .divider span { font-size:0.68rem; color:rgba(199,125,255,0.45); letter-spacing:0.15em; text-transform:uppercase; }
  </style>
</head>
